services:
  mysql-db:
    image: mysql:8.0
    container_name: mom_baby_db
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mydb
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/data:/docker-entrypoint-initdb.d
    networks:
      - mom_baby_network

  backend:
    build: ./backend
    container_name: mom_baby_backend
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: mydb
      NODE_ENV: development
    depends_on:
      - mysql-db
    networks:
      - mom_baby_network

  adminer:
    image: adminer
    container_name: mom_baby_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mysql-db
    networks:
      - mom_baby_network

networks:
  mom_baby_network:
    driver: bridge

volumes:
  db_data:
